name: Bakery API CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies with SSL Bypass
      run: |
        npm config set strict-ssl false
        npm install

    - name: Run Unit Tests (Direct Path Execution)
      run: npx jest
